<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tarot — Screenshot</title>
    <link rel="stylesheet" href="../assets/screenshot-tarot.css">
</head>
<body>

<svg style="display:none" aria-hidden="true">
  <defs>
    <symbol id="card-face" viewBox="0 0 150 225">
      <rect x="7" y="7" width="136" height="211" rx="9"
            fill="none" stroke="#c8a84b" stroke-opacity=".22" stroke-width="1"/>
      <radialGradient id="cg" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#6a3aff" stop-opacity=".14"/>
        <stop offset="100%" stop-color="#6a3aff" stop-opacity="0"/>
      </radialGradient>
      <circle cx="75" cy="112.5" r="54" fill="url(#cg)"/>
      <g transform="translate(75,112.5)" fill="#c8a84b" fill-opacity=".82">
        <polygon points="0,-44 6,-12 31,-31 12,-6 44,0 12,6 31,31 6,12 0,44 -6,12 -31,31 -12,6 -44,0 -12,-6 -31,-31 -6,-12"/>
        <circle r="5.5"/>
      </g>
      <circle cx="75"    cy="52.5"  r="6" fill="#c8a84b" fill-opacity=".70"/>
      <circle cx="117.4" cy="70.1"  r="6" fill="#c8a84b" fill-opacity=".50"/>
      <circle cx="135"   cy="112.5" r="6" fill="#c8a84b" fill-opacity=".33"/>
      <circle cx="117.4" cy="154.9" r="6" fill="#c8a84b" fill-opacity=".18"/>
      <circle cx="75"    cy="172.5" r="6" fill="none" stroke="#c8a84b" stroke-opacity=".42" stroke-width="1.5"/>
      <circle cx="32.6"  cy="154.9" r="6" fill="#c8a84b" fill-opacity=".18"/>
      <circle cx="15"    cy="112.5" r="6" fill="#c8a84b" fill-opacity=".33"/>
      <circle cx="32.6"  cy="70.1"  r="6" fill="#c8a84b" fill-opacity=".50"/>
      <circle cx="16"  cy="16"  r="2.4" fill="#c8a84b" fill-opacity=".48"/>
      <circle cx="134" cy="16"  r="2.4" fill="#c8a84b" fill-opacity=".48"/>
      <circle cx="16"  cy="209" r="2.4" fill="#c8a84b" fill-opacity=".48"/>
      <circle cx="134" cy="209" r="2.4" fill="#c8a84b" fill-opacity=".48"/>
      <circle cx="16"  cy="80"  r="1.7" fill="#c8a84b" fill-opacity=".28"/>
      <circle cx="16"  cy="145" r="1.7" fill="#c8a84b" fill-opacity=".28"/>
      <circle cx="134" cy="80"  r="1.7" fill="#c8a84b" fill-opacity=".28"/>
      <circle cx="134" cy="145" r="1.7" fill="#c8a84b" fill-opacity=".28"/>
    </symbol>
  </defs>
</svg>

<div class="screen">

  <div class="neb n1"></div>
  <div class="neb n2"></div>
  <div class="neb n3"></div>

  <div class="sbar">
    <span class="sbar-time">00:02</span>
    <div class="sbar-r">
      <svg width="22" height="14" viewBox="0 0 22 14">
        <rect x="0"  y="4" width="3" height="8"  rx="1" fill="white" opacity=".35"/>
        <rect x="4"  y="2" width="3" height="10" rx="1" fill="white" opacity=".55"/>
        <rect x="8"  y="0" width="3" height="14" rx="1" fill="white" opacity=".75"/>
        <rect x="12" y="0" width="3" height="14" rx="1" fill="white"/>
        <rect x="17" y="4" width="2.5" height="6" rx=".8" fill="none" stroke="white" stroke-width="1" opacity=".6"/>
        <rect x="17.5" y="4.5" width="2" height="5" rx=".5" fill="white" opacity=".7"/>
      </svg>
      <span class="sbar-bat">100</span>
    </div>
  </div>

  <nav class="appbar">
    <button class="ico-btn" aria-label="Voltar">
      <svg width="28" height="28" viewBox="0 0 24 24">
        <path d="M15 18l-6-6 6-6" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="appbar-title">• Cruz Celta •</h1>
    <button class="ico-btn" aria-label="Info">
      <svg width="40" height="40" viewBox="0 0 36 36">
        <circle cx="18" cy="18" r="15.5" stroke="white" stroke-width="1.6" fill="none" stroke-opacity=".82"/>
        <circle cx="18" cy="13"  r="1.9"  fill="white" fill-opacity=".85"/>
        <path d="M18 17v9" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-opacity=".85"/>
      </svg>
    </button>
  </nav>

  <div class="cross-glow"></div>

  <div class="card pos-above">
    <svg width="150" height="225" viewBox="0 0 150 225"><use href="#card-face"/></svg>
  </div>
  <div class="card pos-left">
    <svg width="150" height="225" viewBox="0 0 150 225"><use href="#card-face"/></svg>
  </div>
  <div class="card pos-center">
    <svg width="150" height="225" viewBox="0 0 150 225"><use href="#card-face"/></svg>
  </div>
  <div class="card pos-crossing">
    <svg width="150" height="225" viewBox="0 0 150 225"><use href="#card-face"/></svg>
  </div>
  <div class="card pos-right">
    <svg width="150" height="225" viewBox="0 0 150 225"><use href="#card-face"/></svg>
  </div>
  <div class="card pos-below">
    <svg width="150" height="225" viewBox="0 0 150 225"><use href="#card-face"/></svg>
  </div>

  <div class="card staff-4">
    <svg width="150" height="225" viewBox="0 0 150 225"><use href="#card-face"/></svg>
  </div>
  <div class="card staff-3">
    <svg width="150" height="225" viewBox="0 0 150 225"><use href="#card-face"/></svg>
  </div>
  <div class="card staff-2">
    <svg width="150" height="225" viewBox="0 0 150 225"><use href="#card-face"/></svg>
  </div>
  <div class="card staff-1">
    <svg width="150" height="225" viewBox="0 0 150 225"><use href="#card-face"/></svg>
  </div>

  <div class="bottom-cta">
    <button class="reveal-btn">REVELAR AS CARTAS</button>
  </div>

</div>
</body>
</html>
